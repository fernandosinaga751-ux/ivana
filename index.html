/* ============================================================
   SUPABASE MINI-CLIENT  (tanpa install package)
   ============================================================ */
const sb = {
  headers: () => ({
    "Content-Type": "application/json",
    apikey: CFG.SUPABASE_ANON,
    Authorization: `Bearer ${CFG.SUPABASE_ANON}`,
  }),
  url: (table, query = "") =>
    `${CFG.SUPABASE_URL}/rest/v1/${table}${query}`,

  async select(table, query = "") {
    const r = await fetch(sb.url(table, query), {
      headers: { ...sb.headers(), Accept: "application/json",
        Prefer: "return=representation" },
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async upsert(table, data) {
    const r = await fetch(sb.url(table), {
      method: "POST",
      headers: { ...sb.headers(), Prefer: "resolution=merge-duplicates,return=representation" },
      body: JSON.stringify(data),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async update(table, id, data) {
    const r = await fetch(sb.url(table, `?id=eq.${id}`), {
      method: "PATCH",
      headers: { ...sb.headers(), Prefer: "return=representation" },
      body: JSON.stringify(data),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async remove(table, id) {
    const r = await fetch(sb.url(table, `?id=eq.${id}`), {
      method: "DELETE", headers: sb.headers(),
    });
    if (!r.ok) throw new Error(await r.text());
  },
};

/* ============================================================
   CLOUDINARY UPLOAD  (unsigned preset)
   ============================================================ */
async function uploadToCloudinary(file, onProgress) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CFG.UPLOAD_PRESET);
  fd.append("folder", "dearmatrip");

  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable && onProgress)
        onProgress(Math.round((e.loaded / e.total) * 100));
    };
    xhr.onload = () => {
      if (xhr.status === 200) resolve(JSON.parse(xhr.responseText).secure_url);
      else reject(new Error("Upload gagal"));
    };
    xhr.onerror = () => reject(new Error("Network error"));
    xhr.open("POST", `https://api.cloudinary.com/v1_1/${CFG.CLOUD_NAME}/image/upload`);
    xhr.send(fd);
  });
}

/* ============================================================
   VIDEO UPLOAD ke Cloudinary (max 30MB)
   ============================================================ */
async function uploadVideoToCloudinary(file, onProgress) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CFG.UPLOAD_PRESET);
  fd.append("folder", "dearmatrip/videos");
  fd.append("resource_type", "video");

  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable && onProgress)
        onProgress(Math.round((e.loaded / e.total) * 100));
    };
    xhr.onload = () => {
      if (xhr.status === 200) resolve(JSON.parse(xhr.responseText).secure_url);
      else reject(new Error("Upload video gagal: " + xhr.responseText));
    };
    xhr.onerror = () => reject(new Error("Network error"));
    xhr.open("POST", `https://api.cloudinary.com/v1_1/${CFG.CLOUD_NAME}/video/upload`);
    xhr.send(fd);
  });
}

/* ============================================================
   VIDEO UPLOAD WIDGET  (max 30MB, langsung ke Cloudinary)
   ============================================================ */
function VideoUpload({ onDone, preview=null, index=0 }) {
  const ref  = useRef();
  const [prog, setProg] = useState(0);
  const [busy, setBusy] = useState(false);
  const [prev, setPrev] = useState(preview);
  const [err,  setErr]  = useState("");

  const handle = async e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 30 * 1024 * 1024) { setErr("❌ File terlalu besar! Maksimal 30MB"); return; }
    setErr(""); setBusy(true); setProg(0);

    // local object URL preview
    const objUrl = URL.createObjectURL(file);
    setPrev(objUrl);

    try {
      const url = await uploadVideoToCloudinary(file, setProg);
      onDone(url);
      URL.revokeObjectURL(objUrl);
    } catch(ex) {
      setErr("Upload gagal — cek CLOUD_NAME & UPLOAD_PRESET. " + ex.message);
    } finally { setBusy(false); setProg(0); }
  };

  return (
    <div>
      <div
        onClick={()=>!busy && ref.current?.click()}
        style={{
          border:"2px dashed #CBD5E1", borderRadius:10, padding:"10px 14px",
          textAlign:"center", cursor:busy?"wait":"pointer", background:"#F8FAFF",
          transition:"border .2s, background .2s",
        }}
        onMouseEnter={e=>{ if(!busy){e.currentTarget.style.borderColor=T.blue;e.currentTarget.style.background="#EFF6FF";}}}
        onMouseLeave={e=>{ e.currentTarget.style.borderColor="#CBD5E1";e.currentTarget.style.background="#F8FAFF";}}>
        <div style={{fontSize:"1.6rem",marginBottom:4}}>🎬</div>
        <div style={{fontSize:".78rem",color:T.gray,fontWeight:600}}>
          {busy ? `Uploading… ${prog}%` : "Klik untuk upload video (max 30MB)"}
        </div>
        <div style={{fontSize:".7rem",color:"#bbb",marginTop:2}}>MP4, MOV, AVI · Maks 30MB</div>
      </div>
      {busy && (
        <div style={{height:5,background:"#E5E7EB",borderRadius:3,marginTop:6,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${prog}%`,
            background:`linear-gradient(90deg,${T.blue},${T.teal})`,
            transition:"width .3s",borderRadius:3}}/>
        </div>
      )}
      {err && <p style={{color:T.red,fontSize:".76rem",marginTop:4}}>{err}</p>}
      {prev && (
        <video src={prev} controls style={{marginTop:8,width:"100%",borderRadius:8,maxHeight:120}} muted/>
      )}
      <input ref={ref} type="file" accept="video/mp4,video/mov,video/avi,video/*"
        style={{display:"none"}} onChange={handle}/>
    </div>
  );
}
function ImgUpload({ onDone, label="Upload Foto", preview=null, small=false }) {
  const ref  = useRef();
  const [prog, setProg]   = useState(0);
  const [busy, setBusy]   = useState(false);
  const [prev, setPrev]   = useState(preview);
  const [err,  setErr]    = useState("");

  const handle = async e => {
    const file = e.target.files[0];
    if (!file) return;
    setErr(""); setBusy(true); setProg(0);
    // local preview
    const reader = new FileReader();
    reader.onload = ev => setPrev(ev.target.result);
    reader.readAsDataURL(file);

    try {
      const url = await uploadToCloudinary(file, setProg);
      onDone(url);
    } catch(ex) {
      setErr("Upload gagal — cek CLOUD_NAME & UPLOAD_PRESET");
      // fallback ke base64 lokal
      const r2 = new FileReader();
      r2.onload = ev => { onDone(ev.target.result); };
      r2.readAsDataURL(file);
    } finally { setBusy(false); }
  };

  const bStyle = {
    border:"2px dashed #CBD5E1", borderRadius:10,
    padding: small?"6px 10px":"12px 16px",
    textAlign:"center", cursor:"pointer", background:"#F8FAFF",
    display:"flex", alignItems:"center", gap:8,
    transition:"border .2s, background .2s",
  };

  return (
    <div>
      <div style={bStyle}
        onClick={()=>ref.current?.click()}
        onMouseEnter={e=>{e.currentTarget.style.borderColor=T.blue;e.currentTarget.style.background="#EFF6FF";}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor="#CBD5E1";e.currentTarget.style.background="#F8FAFF";}}
      >
        <span style={{fontSize:small?"1rem":"1.4rem"}}>☁️</span>
        <span style={{fontSize:".8rem",color:T.gray}}>
          {busy ? `Uploading ${prog}%…` : label}
        </span>
      </div>
      {busy && (
        <div style={{height:4,background:"#E5E7EB",borderRadius:2,marginTop:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${prog}%`,background:`linear-gradient(90deg,${T.blue},${T.teal})`,transition:"width .3s"}} />
        </div>
      )}
      {err && <p style={{color:T.red,fontSize:".76rem",marginTop:4}}>{err} (base64 digunakan)</p>}
      {prev && <img src={prev} alt="" style={{marginTop:6,height:small?48:70,objectFit:"cover",borderRadius:8,display:"block"}} />}
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={handle}/>
    </div>
  );
}

function DestCard({ dest, trips, go }) {

  const priv = dt.filter(t=>t.type==="private");
  const mp   = dt.length ? Math.min(...dt.map(t=>minPrice(t))) : null;
  const [hov,setHov] = useState(false);
  return (
    <div style={{borderRadius:20,overflow:"hidden",position:"relative",
      aspectRatio:"3/4",cursor:"pointer",
      boxShadow:hov?"0 22px 60px rgba(0,0,0,.28)":"0 6px 24px rgba(0,0,0,.1)",

      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}

              <span style={{color:T.gray,fontSize:".7rem",padding:"2px 0"}}>+{trip.pax_pricing.length-3} lagi</span>}
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          borderTop:"1px solid #F0F4FC",paddingTop:".8rem"}}>
          <div>
            <div style={{fontSize:".7rem",color:"#9ca3af"}}>Mulai dari</div>

          </div>
        </div>
      </div>
    </div>
  );
}

/* helpers: detect URL type and build embed */
function isCloudinaryVideo(url) {
  return url && (url.includes("cloudinary.com") || url.includes("res.cloudinary.com"));
}
function isYoutube(url) {
  return url && (url.includes("youtube.com") || url.includes("youtu.be"));
}
function ytEmbed(url, autoplay=false) {
  if(!url) return "";
  let id = "";
  try {
    const u = new URL(url);
    if(u.hostname.includes("youtu.be")) id = u.pathname.slice(1);
    else id = u.searchParams.get("v") || "";
  } catch { id = url; }
  return `https://www.youtube.com/embed/${id}?rel=0${autoplay?"&autoplay=1":""}`;
}
function getVideoThumb(url) {
  if(!url) return "";
  if(isCloudinaryVideo(url)) {
    // Convert Cloudinary video URL to thumbnail image
    return url.replace("/video/upload/", "/video/upload/so_0/").replace(/\.(mp4|mov|avi|webm)$/i, ".jpg");
  }
  if(isYoutube(url)) {
    try {
      const u = new URL(url);
      const id = u.hostname.includes("youtu.be") ? u.pathname.slice(1) : u.searchParams.get("v") || "";
      return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
    } catch { return ""; }
  }
  return "";
}

/* ── LIGHTBOX ─────────────────────────────────────────── */
function Lightbox({ items, startIndex, type, onClose }) {
  const [idx, setIdx] = useState(startIndex);
  const total = items.filter(Boolean).length;
  const activeItems = items.filter(Boolean);

  const prev = () => setIdx(i => (i - 1 + total) % total);
  const next = () => setIdx(i => (i + 1) % total);

  /* keyboard navigation */
  useEffect(() => {
    const onKey = e => {
      if (e.key === "ArrowLeft")  prev();
      if (e.key === "ArrowRight") next();
      if (e.key === "Escape")     onClose();
    };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, []);

  const url = activeItems[idx];

  const BtnNav = ({ dir, onClick }) => (
    <button onClick={onClick}
      style={{
        position:"absolute", top:"50%", transform:"translateY(-50%)",
        [dir==="prev"?"left":"right"]: 20,
        background:"rgba(255,255,255,.12)", backdropFilter:"blur(10px)",
        border:"1px solid rgba(255,255,255,.2)", color:"white",
        width:52, height:52, borderRadius:"50%", cursor:"pointer",
        fontSize:"1.5rem", display:"flex", alignItems:"center", justifyContent:"center",
        transition:"background .2s, transform .2s", zIndex:10,
      }}
      onMouseEnter={e=>{ e.currentTarget.style.background="rgba(255,255,255,.25)"; e.currentTarget.style.transform="translateY(-50%) scale(1.1)"; }}
      onMouseLeave={e=>{ e.currentTarget.style.background="rgba(255,255,255,.12)"; e.currentTarget.style.transform="translateY(-50%) scale(1)"; }}>
      {dir==="prev" ? "‹" : "›"}
    </button>
  );

  return (
    <div
      onClick={onClose}
      style={{
        position:"fixed", inset:0, zIndex:9999,
        background:"rgba(5,10,18,.96)", backdropFilter:"blur(18px)",
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        animation:"lbIn .2s ease",
      }}>
      <style>{`@keyframes lbIn{from{opacity:0}to{opacity:1}}`}</style>

      {/* close */}
      <button onClick={onClose}
        style={{
          position:"fixed", top:20, right:24, background:"rgba(255,255,255,.1)",
          border:"1px solid rgba(255,255,255,.18)", color:"white",
          width:44, height:44, borderRadius:"50%", cursor:"pointer",
          fontSize:"1.3rem", display:"flex", alignItems:"center", justifyContent:"center",
          backdropFilter:"blur(10px)", transition:"background .2s",
        }}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.22)"}
        onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.1)"}>
        ✕
      </button>

      {/* counter */}
      <div style={{
        position:"fixed", top:24, left:"50%", transform:"translateX(-50%)",
        background:"rgba(255,255,255,.08)", backdropFilter:"blur(10px)",
        border:"1px solid rgba(255,255,255,.12)", color:"rgba(255,255,255,.75)",
        padding:"5px 18px", borderRadius:50, fontSize:".82rem", fontWeight:700,
        letterSpacing:".06em",
      }}>
        {idx+1} / {total}
      </div>

      {/* main content */}
      <div onClick={e=>e.stopPropagation()}
        style={{
          maxWidth:"90vw", maxHeight:"82vh", display:"flex",
          alignItems:"center", justifyContent:"center", position:"relative",
        }}>
        {type==="photo" ? (
          <img
            key={url}
            src={url} alt=""
            style={{
              maxWidth:"88vw", maxHeight:"80vh",
              objectFit:"contain", borderRadius:14,
              boxShadow:"0 30px 80px rgba(0,0,0,.6)",
              animation:"lbIn .25s ease",
            }}
          />
        ) : (
          <div key={url} style={{
            width:"min(860px, 88vw)", aspectRatio:"16/9",
            borderRadius:14, overflow:"hidden",
            boxShadow:"0 30px 80px rgba(0,0,0,.6)",
            animation:"lbIn .25s ease",
          }}>
            {isCloudinaryVideo(url) ? (
              <video
                src={url} controls autoPlay
                style={{width:"100%",height:"100%",display:"block",background:"#000"}}
                controlsList="nodownload"
              />
            ) : (
              <iframe
                src={ytEmbed(url, true)}
                width="100%" height="100%"
                style={{border:0, display:"block"}}
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowFullScreen
                title={`video-${idx}`}
              />
            )}
          </div>
        )}
      </div>

      {/* prev / next */}
      {total > 1 && <>
        <BtnNav dir="prev" onClick={e=>{e.stopPropagation();prev();}}/>
        <BtnNav dir="next" onClick={e=>{e.stopPropagation();next();}}/>
      </>}

      {/* thumbnail strip */}
      {total > 1 && (
        <div style={{
          position:"fixed", bottom:16, left:"50%", transform:"translateX(-50%)",
          display:"flex", gap:8, padding:"10px 16px",
          background:"rgba(0,0,0,.5)", backdropFilter:"blur(10px)",
          borderRadius:50, border:"1px solid rgba(255,255,255,.1)",
          maxWidth:"90vw", overflowX:"auto",
        }}
          onClick={e=>e.stopPropagation()}>
          {activeItems.map((item,i)=>(
            <div key={i} onClick={()=>setIdx(i)}
              style={{
                width: type==="photo" ? 48 : 72,
                height: 36,
                borderRadius:8, overflow:"hidden", cursor:"pointer", flexShrink:0,
                border: i===idx ? `2px solid ${T.teal}` : "2px solid transparent",
                opacity: i===idx ? 1 : 0.5,
                transition:"all .2s",
              }}>
              {type==="photo"
                ? <img src={item} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                : (getVideoThumb(item)
                    ? <img src={getVideoThumb(item)} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity: i===idx?1:0.6}}/>
                    : <div style={{
                        width:"100%",height:"100%",
                        background: i===idx ? T.teal : "#333",
                        display:"flex",alignItems:"center",justifyContent:"center",
                        color:"white",fontSize:"1rem",
                      }}>▶</div>
                  )
              }
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   RICH TEXT EDITOR  — toolbar: Bold / Italic / Underline /
                        Bullet / Numbered / H3 / Clear
   ============================================================ */
function RTE({ value, onChange, placeholder = "Ketik deskripsi di sini…" }) {
  const ref   = useRef(null);
  const ready = useRef(false);

  // Inject HTML once on mount
  useEffect(() => {
    if (ref.current && !ready.current) {
      ref.current.innerHTML = value || "";
      ready.current = true;
    }
  }, []);

  const exec = (cmd, arg) => {
    ref.current && ref.current.focus();
    document.execCommand(cmd, false, arg ?? null);
    if (ref.current) onChange(ref.current.innerHTML);
  };

  const TB = ({ cmd, arg, title, children }) => (
    <button type="button" title={title}
      onMouseDown={e => { e.preventDefault(); exec(cmd, arg); }}
      style={{
        minWidth: 30, height: 30, border: "1px solid #D1D5DB",
        borderRadius: 6, background: "white", cursor: "pointer",
        fontFamily: "inherit", fontSize: ".82rem",
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: "0 6px", transition: "background .15s",
      }}
      onMouseEnter={e => e.currentTarget.style.background = "#EFF6FF"}
      onMouseLeave={e => e.currentTarget.style.background = "white"}>
      {children}
    </button>
  );

  return (
    <div style={{ border: "1.5px solid #E5E7EB", borderRadius: 10, overflow: "hidden" }}>
      {/* Toolbar */}
      <div style={{
        display: "flex", gap: 3, padding: "7px 10px",
        background: "#F8FAFF", borderBottom: "1px solid #E5E7EB",
        flexWrap: "wrap", alignItems: "center",
      }}>
        <TB cmd="bold"                title="Bold (Tebal)"><b>B</b></TB>
        <TB cmd="italic"              title="Italic (Miring)"><i>I</i></TB>
        <TB cmd="underline"           title="Garis Bawah"><u>U</u></TB>
        <div style={{ width: 1, height: 22, background: "#E5E7EB", margin: "0 3px" }} />
        <TB cmd="insertUnorderedList" title="Bullet List">• List</TB>
        <TB cmd="insertOrderedList"   title="Numbered List">1. List</TB>
        <div style={{ width: 1, height: 22, background: "#E5E7EB", margin: "0 3px" }} />
        <TB cmd="formatBlock" arg="h3" title="Heading 3">H3</TB>
        <TB cmd="formatBlock" arg="p"  title="Paragraf Normal">¶</TB>
        <div style={{ width: 1, height: 22, background: "#E5E7EB", margin: "0 3px" }} />
        <TB cmd="removeFormat" title="Hapus Semua Format">
          <span style={{ fontSize: ".72rem", color: "#888" }}>✕ Format</span>
        </TB>
      </div>
      {/* Editable area */}
      <div
        ref={ref}
        contentEditable
        suppressContentEditableWarning
        data-placeholder={placeholder}
        onInput={() => ref.current && onChange(ref.current.innerHTML)}
        style={{
          minHeight: 130, padding: "10px 14px",
          outline: "none", fontFamily: "inherit",
          fontSize: ".9rem", lineHeight: 1.8, color: "#333",
        }}
      />
    </div>
  );
}

function AdminTripForm({ trip: init, onSave, onCancel }) {
  const DRAFT_KEY = `dm_draft_${init.id||"new"}`;

  // Load from draft first, then init
  const [t,setT] = useState(()=>{
    try {
      const saved = sessionStorage.getItem(DRAFT_KEY);
      if(saved) return JSON.parse(saved);
    } catch {}
    return JSON.parse(JSON.stringify(init));
  });

  // Autosave draft on every change
  useEffect(()=>{
    try { sessionStorage.setItem(DRAFT_KEY, JSON.stringify(t)); } catch {}
  },[t]);

  const upd = (k,v) => setT(p=>({...p,[k]:v}));

  const handleSave = async () => {
    await onSave(t);
    sessionStorage.removeItem(DRAFT_KEY); // clear draft after save
  };

  const handleCancel = () => {
    if(window.confirm("Batal edit? Draft akan dihapus.")) {
      sessionStorage.removeItem(DRAFT_KEY);
      onCancel();
    }
  };

  const [hasDraft] = useState(()=>!!sessionStorage.getItem(DRAFT_KEY) && sessionStorage.getItem(DRAFT_KEY) !== JSON.stringify(init));

  const S = {
    lbl:  {fontWeight:700,fontSize:".82rem",color:"#374151",display:"block",marginBottom:4},
    inp:  {width:"100%",padding:".72rem .9rem",border:"1.5px solid #E5E7EB",borderRadius:10,
           fontFamily:"inherit",fontSize:".9rem",outline:"none",boxSizing:"border-box"},
    sec:  {background:"white",borderRadius:16,padding:"1.5rem",marginBottom:"1.2rem",border:"1px solid #E8EFF9"},
    stit: {fontWeight:800,color:"#081828",marginBottom:"1rem",fontSize:"1rem"},
  };

  /* pax pricing */
  const addPax    = ()=>upd("pax_pricing",[...(t.pax_pricing||[]),{pax:2,label:"2 Pax",price:0}]);

  const updPax    = (i,k,v)=>{const a=[...t.pax_pricing];a[i]={...a[i],[k]:["price","pax"].includes(k)?parseInt(v)||0:v};upd("pax_pricing",a);};

  /* gallery */
  const addGal    = ()=>upd("gallery",[...(t.gallery||[]),""]);
  const remGal    = i =>upd("gallery",t.gallery.filter((_,x)=>x!==i));
  const updGal    = (i,v)=>{const g=[...t.gallery];g[i]=v;upd("gallery",g);};

  /* itinerary */
  const addDay    = ()=>upd("itinerary",[...(t.itinerary||[]),{day:(t.itinerary||[]).length+1,title:`Day ${(t.itinerary||[]).length+1}`,rows:[["",""]]}]);
  const remDay    = di=>upd("itinerary",t.itinerary.filter((_,i)=>i!==di));
  const addRow    = di=>{const it=[...t.itinerary];it[di]={...it[di],rows:[...it[di].rows,["",""]]};upd("itinerary",it);};
  const remRow    = (di,ri)=>{const it=[...t.itinerary];it[di]={...it[di],rows:it[di].rows.filter((_,i)=>i!==ri)};upd("itinerary",it);};
  const updRow    = (di,ri,col,v)=>{const it=JSON.parse(JSON.stringify(t.itinerary));it[di].rows[ri][col]=v;upd("itinerary",it);};
  const updDayT   = (di,v)=>{const it=[...t.itinerary];it[di]={...it[di],title:v};upd("itinerary",it);};

  /* list fields */
  const lf = k => ({
    items: t[k]||[],
    add:   ()=>upd(k,[...(t[k]||[]),""]),
    rem:   i =>upd(k,(t[k]||[]).filter((_,x)=>x!==i)),
    upd:   (i,v)=>{const a=[...(t[k]||[])];a[i]=v;upd(k,a);},
  });

  /* faq */
  const addFaq = ()=>upd("faq",[...(t.faq||[]),{q:"",a:""}]);
  const remFaq = i =>upd("faq",t.faq.filter((_,x)=>x!==i));
  const updFaq = (i,k,v)=>{const f=[...t.faq];f[i]={...f[i],[k]:v};upd("faq",f);};

  const updJadwal = (m,v)=>upd("jadwal",{...(t.jadwal||{}),[m]:v.split("\n").filter(Boolean)});

          padding:".65rem 1rem",marginBottom:"1rem",fontSize:".83rem",color:"#92400E",
          display:"flex",alignItems:"center",gap:8}}>

        </div>
        <div>
          <label style={S.lbl}>Deskripsi</label>
          <p style={{fontSize:".74rem",color:"#9ca3af",marginBottom:5}}>

/* ============================================================
   URL ↔ PAGE  helpers
   ============================================================ */
function urlToState(pathname, trips) {
  const parts = pathname.replace(/^\//, "").split("/").filter(Boolean);
  const seg = parts[0] || "home";
  switch (seg) {
    case "faq":         return { page: "faq",        params: {} };
    case "portofolio":  return { page: "portofolio",  params: {} };
    case "aboutus":      return { page: "about",       params: {} };
    case "admin":       return { page: "admin",       params: {} };
    case "opentrip":    return { page: "destpage",    params: { destId: parts[1] || "danautoba", filterType: "open" } };
    case "privatetrip": return { page: "destpage",    params: { destId: parts[1] || "danautoba", filterType: "private" } };
    case "trip": {
      const tripId = parts[1];
      const found  = (trips || []).find(t => t.id === tripId);
      return { page: "detail", params: { tripId, trip: found || null } };
    }
    default: return { page: "home", params: {} };
  }
}

function stateToUrl(page, params) {
  switch (page) {
    case "faq":        return "/faq";
    case "portofolio": return "/portofolio";
    case "about":      return "/aboutus";
    case "admin":      return "/admin";
    case "destpage": {
      const type = params.filterType === "private" ? "privatetrip" : "opentrip";
      return `/${type}/${params.destId || "danautoba"}`;
    }
    case "detail": {
      const tr = params.trip;
      if (tr) return `/trip/${tr.id}`;
      if (params.tripId) return `/trip/${params.tripId}`;
      return "/";
    }
    default: return "/";
  }
}

function App() {
  const initState = urlToState(window.location.pathname, []);
  const [page, setPage] = useState(initState.page);
  const [params, setParams] = useState(initState.params);
  const [trips,    setTrips]    = useState([]);
  const [faqs,     setFaqs]     = useState([]);
  const [portoData,setPortoData]= useState({photos:Array(12).fill(""),videos:Array(6).fill("")});
  const [loading,  setLoading]  = useState(true);
  const [dbReady,  setDbReady]  = useState(false);
  const [adminIn,  setAdminIn]  = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [mobileMenu, setMobileMenu] = useState(false);

  // ── Admin auto-logout after 60s idle
  const idleRef = useRef(null);
  const resetIdle = useCallback(()=>{
    clearTimeout(idleRef.current);
    idleRef.current = setTimeout(()=>{
      setAdminIn(false);
      setPage("home");
      history.pushState({}, "", "/");
    }, 60000);
  },[]);

  useEffect(()=>{
    if(!adminIn){ clearTimeout(idleRef.current); return; }
    resetIdle();
    const events=["mousemove","keydown","click","scroll","touchstart"];
    events.forEach(e=>window.addEventListener(e,resetIdle));
    return()=>{ clearTimeout(idleRef.current); events.forEach(e=>window.removeEventListener(e,resetIdle)); };
  },[adminIn,resetIdle]);

  // ── Back/forward browser button
  useEffect(() => {
    const onPop = () => {
      const s = urlToState(window.location.pathname, trips);
      setPage(s.page);
      setParams(s.params);
      if (s.page !== "admin") setAdminIn(false);
      window.scrollTo(0, 0);
    };
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
  }, [trips]);

  // ── Re-hydrate trip from URL once trips are loaded
  useEffect(() => {
    if (!trips.length) return;
    if (page === "detail" && params.tripId && !params.trip) {
      const found = trips.find(t => t.id === params.tripId);
      if (found) setParams(p => ({ ...p, trip: found }));
    }
  }, [trips]);

  // ── Scroll listener
  useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>30);
    window.addEventListener("scroll",h);
    return()=>window.removeEventListener("scroll",h);
  },[]);

  // ── Load from Supabase
  useEffect(()=>{
    (async()=>{
      try {
        const [ts,fs,ps] = await Promise.all([
          sb.select("trips","?order=sort_order.asc"),
          sb.select("faqs","?order=sort_order.asc"),
          sb.select("porto","?id=eq.main").catch(()=>[]),
        ]);
        setTrips(ts.length ? ts : DEFAULT_TRIPS);
        setFaqs(fs.length  ? fs : DEFAULT_FAQ);
        if(ps?.[0]) setPortoData(ps[0].data || portoData);
        setDbReady(true);
      } catch(e) {
        console.warn("Supabase tidak terhubung — data lokal.", e.message);
        setTrips(DEFAULT_TRIPS);
        setFaqs(DEFAULT_FAQ);
      }
      setLoading(false);
    })();
  },[]);

  // ── CRUD
  const saveTrip = useCallback(async trip => {
    if(dbReady){ const s=await sb.upsert("trips",trip); setTrips(prev=>{const i=prev.findIndex(t=>t.id===trip.id);return i>=0?prev.map(t=>t.id===trip.id?s[0]:t):[...prev,s[0]];}); }
    else setTrips(prev=>{const i=prev.findIndex(t=>t.id===trip.id);return i>=0?prev.map(t=>t.id===trip.id?trip:t):[...prev,trip];});
  },[dbReady]);

  const deleteTrip = useCallback(async id=>{
    if(dbReady) await sb.remove("trips",id);
    setTrips(prev=>prev.filter(t=>t.id!==id));
  },[dbReady]);

  const saveFaqs = useCallback(async list=>{
    if(dbReady) await Promise.all(list.map((f,i)=>sb.upsert("faqs",{...f,sort_order:i+1})));
    setFaqs(list);
  },[dbReady]);

  const savePorto = useCallback(async data=>{
    if(dbReady) await sb.upsert("porto",{id:"main",data});
    setPortoData(data);
  },[dbReady]);

  function go(p, prm={}) {
    const url = stateToUrl(p, prm);
    history.pushState({ page: p, params: prm }, "", url);
    setPage(p); setParams(prm); setMobileMenu(false); window.scrollTo(0,0);
  }

  function adminLogin(){
    setAdminIn(true);
    resetIdle();
  }
  function adminLogout(){
    setAdminIn(false);
    go("home");
  }

  if(loading) return (
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",
      height:"100vh",background:T.bg,flexDirection:"column",gap:"1.2rem"}}>
      <div style={{width:56,height:56,border:`3px solid rgba(0,188,212,.25)`,
        borderTop:`3px solid ${T.teal}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <span style={{fontSize:".95rem",color:"rgba(255,255,255,.45)",
        fontFamily:"'Cormorant Garamond',serif",letterSpacing:".12em"}}>DEARMATRIP</span>
    </div>
  );

  // Find trip from params (re-hydrate after refresh)
  const activeTripId = params?.trip?.id;
  const activeTrip   = activeTripId ? trips.find(t=>t.id===activeTripId)||params.trip : params.trip;

  return (
    <div style={{fontFamily:"'DM Sans','Nunito',sans-serif",background:"white",minHeight:"100vh"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        html{scroll-behavior:smooth;}
        body{overflow-x:hidden;}
        @keyframes spin  { to{transform:rotate(360deg);} }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
        input:focus,textarea:focus,select:focus{
          border-color:#1A6EDB!important;
          box-shadow:0 0 0 3px rgba(26,110,219,.1);
        }
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:#f1f1f1;}
        ::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px;}
        @keyframes slideDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
        [contenteditable][data-placeholder]:empty:before{
          content:attr(data-placeholder);color:#9CA3AF;pointer-events:none;font-style:italic;
        }
        .rte-output ul,.rte-output ol{padding-left:1.5rem;margin:.4rem 0 .8rem;}
        .rte-output li{margin-bottom:.3rem;}
        .rte-output h3{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;margin:.8rem 0 .4rem;color:#081828;}
        .rte-output strong{font-weight:800;}
        .rte-output em{font-style:italic;}
        .dm-hamburger{display:none!important;}
        .dm-nav-links{display:flex;}
        @media(max-width:860px){
          .dm-mob-bookbar{display:flex!important;}
          .dm-detail-wrap{padding-bottom:80px!important;}
          .dm-hamburger{display:flex!important;}
          .dm-nav-links{display:none!important;}
          .dm-hero-title{font-size:2.4rem!important;}
          .dm-hero-sub{font-size:1rem!important;}
          .dm-hero-btns{flex-direction:column!important;align-items:stretch!important;}
          .dm-dest-grid{grid-template-columns:1fr 1fr!important;}
          .dm-why-grid{grid-template-columns:1fr 1fr!important;}
          .dm-trip-cards{grid-template-columns:1fr!important;}
          .dm-detail-wrap{grid-template-columns:1fr!important;padding:1rem 4%!important;}
          .dm-detail-sidebar{position:static!important;top:auto!important;order:-1;}
          .dm-detail-hero{height:240px!important;}
          .dm-itin-time{width:100px!important;min-width:100px!important;font-size:.78rem!important;}
          .dm-itin-act{font-size:.84rem!important;}
          .dm-incl-grid{grid-template-columns:1fr!important;gap:.8rem!important;}
          .dm-tab-btn{padding:.75rem .8rem!important;font-size:.78rem!important;}
          .dm-detail-price{font-size:1.7rem!important;}
          .dm-sidebar-inner{padding:1.2rem!important;}
          .dm-gallery-main{height:200px!important;}
          .dm-about-grid{grid-template-columns:1fr!important;}
          .dm-about-img{display:none!important;}
          .dm-stats-grid{grid-template-columns:1fr 1fr!important;}
          .dm-porto-grid{grid-template-columns:1fr 1fr!important;}
          .dm-video-grid{grid-template-columns:1fr 1fr!important;}
          .dm-footer-grid{grid-template-columns:1fr 1fr!important;}
          .dm-admin-tabs{flex-wrap:wrap!important;}
          .dm-pax-grid{grid-template-columns:1fr 1fr auto!important;}
          .dm-admin-porto{grid-template-columns:1fr 1fr!important;}
        }
        @media(max-width:520px){
          .dm-hero-title{font-size:1.9rem!important;}
          .dm-dest-grid{grid-template-columns:1fr!important;}
          .dm-why-grid{grid-template-columns:1fr!important;}
          .dm-porto-grid{grid-template-columns:1fr!important;}
          .dm-video-grid{grid-template-columns:1fr!important;}
          .dm-footer-grid{grid-template-columns:1fr!important;}
          .dm-admin-porto{grid-template-columns:1fr!important;}
          .dm-stats-grid{grid-template-columns:1fr 1fr!important;}
          .dm-tab-btn{padding:.65rem .6rem!important;font-size:.72rem!important;}
          .dm-itin-time{width:80px!important;min-width:80px!important;font-size:.74rem!important;}
        }
      `}</style>

      {/* ── MOBILE MENU OVERLAY ── */}
      {mobileMenu && (
        <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(7,17,30,.98)",
          display:"flex",flexDirection:"column",padding:"88px 6% 2rem",overflowY:"auto",
          animation:"slideDown .22s ease"}}>
          <button onClick={()=>setMobileMenu(false)}
            style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,.1)",
              border:"none",color:"white",width:40,height:40,borderRadius:"50%",
              cursor:"pointer",fontSize:"1.3rem",display:"flex",alignItems:"center",justifyContent:"center"}}>
            ✕
          </button>
          {[["home","🏠 Beranda"],["portofolio","📸 Portofolio"],["about","👥 About"],["faq","❓ FAQ"]].map(([p,l])=>(
            <div key={p} onClick={()=>go(p)}
              style={{color:page===p?T.teal:"white",fontWeight:700,fontSize:"1.05rem",padding:".9rem 0",
                borderBottom:"1px solid rgba(255,255,255,.08)",cursor:"pointer"}}>
              {l}
            </div>
          ))}
          <div style={{color:"rgba(255,255,255,.35)",fontWeight:800,fontSize:".68rem",
            letterSpacing:".14em",textTransform:"uppercase",padding:"1.2rem 0 .4rem"}}>OPEN TRIP</div>
          {DEST_LIST.filter(d=>trips.some(t=>t.destination===d.id&&t.type==="open")).map(d=>(
            <div key={d.id} onClick={()=>go("destpage",{destId:d.id,filterType:"open"})}
              style={{color:"rgba(255,255,255,.7)",fontSize:".95rem",padding:".6rem 0",
                borderBottom:"1px solid rgba(255,255,255,.05)",cursor:"pointer",paddingLeft:".5rem"}}>
              {d.name}
            </div>
          ))}
          <div style={{color:"rgba(255,255,255,.35)",fontWeight:800,fontSize:".68rem",
            letterSpacing:".14em",textTransform:"uppercase",padding:"1.2rem 0 .4rem"}}>PRIVATE TRIP</div>
          {DEST_LIST.filter(d=>trips.some(t=>t.destination===d.id&&t.type==="private")).map(d=>(
            <div key={d.id} onClick={()=>go("destpage",{destId:d.id,filterType:"private"})}
              style={{color:"rgba(255,255,255,.7)",fontSize:".95rem",padding:".6rem 0",
                borderBottom:"1px solid rgba(255,255,255,.05)",cursor:"pointer",paddingLeft:".5rem"}}>
              {d.name}
            </div>
          ))}
          <a href={`https://wa.me/${CFG.WA_NUM}?text=Halo Dearmatrip!`} target="_blank" rel="noopener noreferrer"
            style={{marginTop:"1.5rem",background:"linear-gradient(135deg,#25D366,#128C7E)",
              color:"white",padding:"1rem",borderRadius:14,textAlign:"center",
              textDecoration:"none",fontWeight:800,fontSize:"1rem"}}>
            💬 Chat WhatsApp
          </a>
        </div>
      )}

      {page!=="admin" && <Navbar go={go} trips={trips} page={page} scrolled={scrolled} onHamburger={()=>setMobileMenu(m=>!m)}/>}

      {page==="home"       && <HomePage go={go} trips={trips}/>}
      {page==="destpage"   && <DestPage destId={params.destId} filterType={params.filterType} trips={trips} go={go}/>}
      {page==="detail"     && activeTrip && <TripDetailPage trip={activeTrip} go={go} allTrips={trips}/>}
      {page==="faq"        && <FAQPage go={go} faqList={faqs}/>}
      {page==="about"      && <AboutPage go={go}/>}
      {page==="portofolio" && <PortofolioPage portoData={portoData} onSavePorto={savePorto}/>}
      {page==="admin" && !adminIn && <AdminLogin onLogin={adminLogin}/>}
      {page==="admin" &&  adminIn &&
        <AdminPanel trips={trips} faqs={faqs} portoData={portoData}
          onSaveTrip={saveTrip} onDeleteTrip={deleteTrip} onSaveFaqs={saveFaqs} onSavePorto={savePorto}
          onLogout={adminLogout} go={go}/>}

      {page!=="admin" && <Footer go={go}/>}

      {/* WhatsApp FAB */}
      {page!=="admin" && (
        <a href={`https://wa.me/${CFG.WA_NUM}?text=Halo Dearmatrip!`} target="_blank" rel="noopener noreferrer"
          style={{position:"fixed",bottom:28,right:28,zIndex:9999,width:58,height:58,
            background:"#25D366",borderRadius:"50%",display:"flex",alignItems:"center",
            justifyContent:"center",boxShadow:"0 6px 24px rgba(37,211,102,.5)",
            textDecoration:"none",fontSize:"1.7rem",transition:"transform .25s,box-shadow .25s"}}
          onMouseOver={e=>{e.currentTarget.style.transform="scale(1.15)";e.currentTarget.style.boxShadow="0 10px 36px rgba(37,211,102,.7)";}}
          onMouseOut={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow="0 6px 24px rgba(37,211,102,.5)";}}>
          💬
        </a>
      )}

      {/* Back to top */}
      {scrolled && page!=="admin" && (
        <button onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
          style={{position:"fixed",bottom:100,right:28,zIndex:9999,width:42,height:42,
            background:"rgba(7,17,30,.8)",color:"white",border:"1px solid rgba(255,255,255,.1)",
            borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
            cursor:"pointer",fontSize:"1rem",backdropFilter:"blur(10px)"}}>↑</button>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
</html>
